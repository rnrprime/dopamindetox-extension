<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Open the full settings page in a tab, not the cramped embedded dialog. -->
    <meta name="manifest.open_in_tab" content="true" />
    <title>Dopamin Detox — Settings</title>
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <svg
          class="brand-mark"
          width="40"
          height="40"
          viewBox="0 0 128 128"
          aria-hidden="true"
          focusable="false"
        >
          <rect width="128" height="128" rx="28" fill="var(--accent-teal)" />
          <path
            d="M64 22 96 32.8v24.8c0 20-13.6 36-32 42.4-18.4-6.4-32-22.4-32-42.4V32.8L64 22Z"
            fill="none"
            stroke="#fff"
            stroke-width="8"
            stroke-linejoin="round"
          />
          <path
            d="m48 64 11.2 11.2L80 53.6"
            fill="none"
            stroke="#fff"
            stroke-width="8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <div>
          <h1>Dopamin Detox</h1>
          <p class="muted">Website blocker settings</p>
        </div>
      </header>

      <section class="card">
        <div class="row toggle-row">
          <span id="toggle-label" class="row-label">Blocking</span>
          <button
            id="master"
            class="switch"
            type="button"
            role="switch"
            aria-checked="true"
            aria-labelledby="toggle-label"
          >
            <span class="switch-track" aria-hidden="true">
              <span class="switch-thumb"></span>
            </span>
            <span id="master-state" class="switch-state">On</span>
          </button>
        </div>
        <p class="muted card-note">
          When off, none of your sites are blocked on this device.
        </p>
      </section>

      <section class="card">
        <h2>Blocked sites</h2>
        <form id="add-form" class="add-form" novalidate>
          <label for="add-input" class="visually-hidden">Add a website to block</label>
          <input
            id="add-input"
            type="text"
            inputmode="url"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="e.g. youtube.com"
          />
          <button class="btn btn-primary" type="submit">Add</button>
        </form>
        <p id="add-error" class="error" role="alert" hidden></p>

        <ul id="list" class="block-list"></ul>

        <div id="empty" class="empty" hidden>
          <h3>No sites blocked yet</h3>
          <p class="muted">
            Add a website above, or use “Block this site” from the toolbar popup.
          </p>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
