<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked — Dopamin Detox</title>
  </head>
  <body>
    <main class="blocked">
      <svg
        class="brand-mark"
        width="56"
        height="56"
        viewBox="0 0 128 128"
        aria-hidden="true"
        focusable="false"
      >
        <rect width="128" height="128" rx="28" fill="var(--accent-teal)" />
        <path
          d="M64 22 96 32.8v24.8c0 20-13.6 36-32 42.4-18.4-6.4-32-22.4-32-42.4V32.8L64 22Z"
          fill="none"
          stroke="#fff"
          stroke-width="8"
          stroke-linejoin="round"
        />
        <path
          d="m48 64 11.2 11.2L80 53.6"
          fill="none"
          stroke="#fff"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>

      <h1>Taking a moment away</h1>
      <p class="lead">
        You asked Dopamin Detox to help you step back from
        <strong id="domain">this site</strong>. That choice is still working for
        you.
      </p>
      <p class="muted">
        When you're ready, take a breath and move on to what matters. You can
        change your block list any time.
      </p>

      <div class="actions">
        <button id="back" class="btn btn-primary" type="button">Go back</button>
        <button id="manage" class="btn" type="button">Manage blocked sites</button>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
